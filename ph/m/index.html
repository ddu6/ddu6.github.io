<!DOCTYPE html>
<head>
    <meta charset='utf8'>
    <meta name='viewport' content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0'>
    <title>PH Monitor</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/ddu6/static@0.1.0/imgs/ph.png" type="image/png">
</head>
<body style='margin:0'>
    <canvas></canvas>
    <script>
        comment=false
        start=0
        const width=100
        const scale=10
        const num=10000
        const height=num/width
        const subHeight=height/10
        const subWidth=width/10
        const canvas=document.getElementsByTagName('canvas')[0]
        canvas.width=width*scale
        canvas.height=height*scale
        const ctx=canvas.getContext('2d')
        ctx.scale(scale,scale)
        async function paintIds(){
            const path0=`${comment?'c':''}ids${start}`
            const res=await fetch(`https://ddu6.ml/services/ph-get/local/${path0}`)
            if(!res.ok)return false
            const json=await res.json()
            start=start*num
            const data=json.map(val=>val-start)
            const data0=data.join(',')
            localStorage.removeItem(path0)
            await paintData(data)
        }
        async function paintData(data){
            ctx.clearRect(0,0,width,height)
            ctx.fillStyle='rgb(30,30,30)'
            for(let i=0;i<data.length;i++){
                const n=data[i]-1
                const x=n%width
                const y=(n-x)/width
                ctx.fillRect(x,y,1,1)
            }
            ctx.fillStyle='grey'
            for(let i=0;i<10;i++){
                const y=i*subHeight+(subHeight-0.1)
                const x=i*subWidth+(subWidth-0.1)
                ctx.fillRect(0,y,width,0.1)
                ctx.fillRect(x,0,0.1,height)
            }
        }
        const params=new URLSearchParams(location.search)
        if(params.has('comment'))comment=true
        const start0=params.get('start')
        if(start0!==null)start=Number(start0)
        paintIds()
    </script>
    <style>
        body{
            background-color: rgb(15,15,15);
        }
        ::-webkit-scrollbar{
            background-color: transparent;
        }
        ::-webkit-scrollbar-corner{
            background-color: transparent;
        }
        ::-webkit-scrollbar-thumb{
            background-color: rgba(255,255,255,.1);
        }
        canvas{
            display: block;
            width: 500px;
            max-width: 100%;
        }
    </style>
</body>
